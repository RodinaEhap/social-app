<div class="max-w-5xl mx-auto py-16 px-6">
  <div class="mb-12 px-4">
    <h1 class="text-5xl font-[1000] tracking-tighter mb-3">
      Account <span class="text-brand-primary">Security</span>
    </h1>
    <p class="text-zinc-500 font-bold uppercase text-2xs tracking-[0.4em]">
      Privacy • Protection • Control
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
    <div class="lg:col-span-4 space-y-8">
      <div
        class="glass-effect p-8 rounded-[2.5rem] border border-white/60 bg-white/70 shadow-[0_20px_50px_rgba(0,0,0,0.05)] relative overflow-hidden group"
      >
        <div class="relative z-10">
          <div
            class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-xl mb-6 group-hover:rotate-12 transition-transform duration-500"
          >
            <i class="fa-solid fa-fingerprint text-2xl text-brand-primary"></i>
          </div>
          <h3 class="text-xl font-black mb-3 flex items-center justify-center gap-2">
            Let's Keep You Safe
            <i class="fa-solid fa-lock text-[15px]"></i>
          </h3>
          <p class="text-sm text-zinc-500 dark:text-zinc-400 leading-relaxed font-medium">
            Just a quick check! Pop in your current password so we know it’s really you.
          </p>
        </div>
        <div
          class="absolute -bottom-10 -right-10 w-32 h-32 bg-brand-primary/20 blur-3xl rounded-full"
        ></div>
        <div class="pt-5">
          <ul class="space-y-4">
            <li class="flex items-center gap-3 text-xs font-bold text-zinc-400">
              <i class="fa-solid fa-check-circle text-brand-primary"></i> 256-bit Encryption
            </li>
            <li class="flex items-center gap-3 text-xs font-bold text-zinc-400">
              <i class="fa-solid fa-check-circle text-brand-primary"></i> Secure Session Handling
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="lg:col-span-8">
      <div
        class="glass-effect rounded-[3.5rem] p-10 md:p-14 border border-white/60 shadow-[0_20px_50px_rgba(0,0,0,0.05)] bg-white/70 backdrop-blur-3xl"
      >
        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="space-y-10">
          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <span
                class="w-8 h-8 rounded-full bg-brand-primary/10 text-brand-primary flex items-center justify-center text-xs font-black"
                >01</span
              >
              <label class="text-[12px] uppercase tracking-[0.15em] font-black text-zinc-600"
                >Current Password</label
              >
            </div>
            <div class="relative group">
              <i
                class="fa-solid fa-key absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 group-focus-within:text-brand-primary transition-colors text-xs"
              ></i>
              <input
                formControlName="password"
                type="password"
                placeholder="••••••••••••"
                class="w-full pl-12 pr-4 py-4 rounded-xl bg-white/50 border border-zinc-200 focus:border-brand-primary outline-none transition-all font-bold text-base placeholder:text-zinc-300 bg-linear-to-r from-indigo-600 to-brand-primary bg-clip-text [-webkit-text-fill-color:transparent]"
              />
            </div>
          </div>

          <div class="space-y-8 pt-4">
            <div class="flex items-center gap-3">
              <span
                class="w-8 h-8 rounded-full bg-brand-primary/10 text-brand-primary flex items-center justify-center text-xs font-black"
                >02</span
              >
              <h4 class="font-black text-[12px] uppercase tracking-widest text-zinc-600">
                Change YOUR Password
              </h4>
            </div>
            <div class="relative group">
              <input
                formControlName="newPassword"
                type="password"
                placeholder="New Password"
                class="w-full px-6 py-4 rounded-xl bg-white/50 border border-zinc-200 focus:border-brand-primary outline-none transition-all font-bold text-base placeholder:text-zinc-300 bg-linear-to-r from-indigo-600 to-brand-primary bg-clip-text [-webkit-text-fill-color:transparent]"
              />
            </div>
          </div>

          <div class="pt-6">
            <button
              [disabled]="passwordForm.invalid"
              class="w-full h-14 flex items-center justify-center rounded-xl border-2 border-zinc-200 bg-transparent text-zinc-400 font-black text-xs uppercase tracking-[0.2em] transition-all duration-300 enabled:hover:border-brand-primary enabled:hover:text-brand-primary enabled:active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed group"
            >
              <span class="flex items-center gap-2">
                Confirm Changes
                <i
                  class="fa-solid fa-check-double text-xs opacity-0 enabled:group-hover:opacity-100 transition-opacity"
                ></i>
              </span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
