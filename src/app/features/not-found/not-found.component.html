<div
  class="min-h-screen flex flex-col items-center justify-center p-6 text-center overflow-hidden"
  style="background-color: var(--bg-body)"
>
  <div class="flex items-center justify-center p-6" style="background-color: var(--bg-body)">
    <div class="w-full max-w-2xl flex flex-col items-center">
      <div class="relative w-full flex justify-center items-center mb-2">
        <span
          class="text-[12rem] md:text-[16rem] font-black opacity-[0.03] absolute inset-0 flex items-center justify-center select-none"
          style="color: var(--text-main); line-height: 1"
        >
          404
        </span>

        <div class="w-24 h-24 md:w-32 md:h-32 relative z-10 flex items-center justify-center">
          <svg class="draw-svg w-full h-full" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="vibeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color: #4b4ce4; stop-opacity: 1" />
                <stop offset="100%" style="stop-color: #0b048a; stop-opacity: 1" />
              </linearGradient>
            </defs>
            <path
              d="M30 35 C 30 20, 65 20, 65 35 C 65 50, 25 55, 25 70 C 25 85, 45 85, 52 78"
              stroke="url(#vibeGradient)"
              stroke-width="12"
              stroke-linecap="round"
              fill="none"
            />
            <path
              d="M52 78 C 58 70, 62 65, 65 85 L 85 55"
              stroke="url(#vibeGradient)"
              stroke-width="12"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </div>
      </div>

      <div class="text-center z-20 relative">
        <h2 class="text-4xl md:text-6xl font-black tracking-tighter uppercase mb-6">
          <span
            class="bg-gradient-to-r from-[#4b4ce4] via-[#6366f1] to-[#0b048a] bg-clip-text text-transparent"
          >
            Vibe check failed
          </span>
        </h2>

        <p
          class="text-sm md:text-base font-medium opacity-50 max-w-sm mx-auto leading-relaxed mb-12 px-4"
          style="color: var(--text-muted)"
        ></p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-[320px] flex flex-col items-center gap-4">
    <button
      (click)="goHome()"
      class="active-link w-full py-4 cursor-pointer hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3"
    >
      <i class="fa-solid fa-house-chimney text-sm"></i>
      <span class="font-bold uppercase tracking-widest text-xs">Back to Timeline</span>
    </button>

    <a
      (click)="goLogin()"
      class="nav-item w-full py-3 justify-center text-2xs md:text-xs uppercase tracking-[0.2em] cursor-pointer hover:opacity-100 transition-all opacity-60"
    >
      Sign in to your account
    </a>
  </div>
</div>
