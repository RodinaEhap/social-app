<div class="max-w-full px-4 md:px-10 lg:px-16 pt-8 pb-24">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
    <aside class="hidden lg:block lg:col-span-3 sticky top-17 h-fit">
      <div class="glass-effect rounded-2xl p-5 border border-white/5">
        <nav class="space-y-1">
          <a
            (click)="changeTab('explore')"
            [class.active-link]="currentTab === 'explore'"
            class="nav-item cursor-pointer"
          >
            <i class="fa-solid fa-globe"></i> <span>Explore Feed</span>
          </a>
          <a
            (click)="changeTab('following')"
            [class.active-link]="currentTab === 'following'"
            class="nav-item cursor-pointer"
          >
            <i class="fa-solid fa-user-group"></i> <span>Following Feed</span>
          </a>
          <hr class="border-white/5 my-4" />
          <a
            (click)="changeTab('saved')"
            [class.active-link]="currentTab === 'saved'"
            class="nav-item cursor-pointer"
          >
            <i class="fa-solid fa-bookmark"></i> <span>Saved</span>
          </a>
          <a
            (click)="changeTab('likes')"
            [class.active-link]="currentTab === 'likes'"
            class="nav-item cursor-pointer"
          >
            <i class="fa-solid fa-heart"></i> <span>Likes</span>
          </a>
          <button
            (click)="isSuggestionsOpen = true"
            class="nav-item w-full text-left text-brand-primary/80 hover:bg-brand-primary/5 mt-2"
          >
            <i class="fa-solid fa-wand-magic-sparkles"></i> <span>Find Friends</span>
          </button>
        </nav>
      </div>
    </aside>
    <main class="col-span-1 lg:col-span-9 space-y-8">
      <div class="max-w-225 mx-auto space-y-6">
        @for (item of allPosts; track item._id) {
          <app-post-card [post]="item"></app-post-card>
        } @empty {
          <div class="text-center py-20 opacity-50">
            <i class="fa-solid fa-layer-group text-4xl mb-4 animate-bounce"></i>
            <p>Gathering vibes for you...</p>
          </div>
        }
        @if (hasNextPage) {
          <div class="flex justify-center py-6">
            <button
              (click)="loadMore()"
              [disabled]="isLoading"
              class="px-10 py-3 bg-brand-primary text-white rounded-xl font-bold hover:scale-105 transition-all disabled:opacity-50"
            >
              @if (isLoading) {
                <i class="fa-solid fa-spinner animate-spin mr-2"></i> Loading...
              } @else {
                Show More Vibes
              }
            </button>
          </div>
        }
      </div>
    </main>
  </div>
</div>
@if (isSuggestionsOpen) {
  <div class="fixed inset-0 z-500">
    <div
      class="absolute inset-0 bg-black/60 backdrop-blur-sm"
      (click)="isSuggestionsOpen = false"
    ></div>
    <div
      class="absolute inset-y-0 right-0 w-[320px] md:w-95 glass-effect border-l border-white/10 p-8 shadow-2xl"
    >
      <div class="flex justify-between items-center mb-8">
        <h3 class="text-xl font-black uppercase tracking-tighter text-(--text-main)">
          Suggestions
        </h3>
        <button (click)="isSuggestionsOpen = false" class="text-red-500">
          <i class="fa-solid fa-circle-xmark text-2xl"></i>
        </button>
      </div>
      <div class="overflow-y-auto h-full pb-20">
        <app-suggestions-card [users]="suggestions"></app-suggestions-card>
      </div>
    </div>
  </div>
}
